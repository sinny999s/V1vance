<svg xmlns="http://www.w3.org/2000/svg" width="261" height="98" viewBox="0 0 261 98">
    <defs>
        <!-- VHS Effect Filter: Animated noise and displacement for jitter -->
        <filter id="vhsEffect" x="-20%" y="-20%" width="140%" height="140%">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" result="noise">
                <animate attributeName="baseFrequency" values="0.02;0.04;0.02" dur="3s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G">
                <animate attributeName="scale" values="8;16;8" dur="3s" repeatCount="indefinite"/>
            </feDisplacementMap>
        </filter>

        <!-- (Optional) Scan Lines Pattern (not applied to full background) -->
        <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
            <rect width="4" height="4" fill="none"/>
            <path d="M0 1 L4 1" stroke="black" stroke-width="0.5" opacity="0.2"/>
        </pattern>

        <!-- Animated Blue Gradient -->
        <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#292929">
                <animate attributeName="stop-color" values="#292929;#cc3434;#292929" dur="4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#cc3434">
                <animate attributeName="stop-color" values="#cc3434;#292929;#cc3434" dur="4s" repeatCount="indefinite"/>
            </stop>
        </linearGradient>

        <!-- Inner Glow Effect -->
        <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#8a1e1e; stop-opacity:0.7"/>
            <stop offset="100%" style="stop-color:#8a1e1e; stop-opacity:0"/>
        </radialGradient>

        <!-- Glow Effect with Subtle Expansion -->
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur">
                <animate attributeName="stdDeviation" values="3;6;3" dur="3s" repeatCount="indefinite"/>
            </feGaussianBlur>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Drop Shadow for Text -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)"/>
        </filter>

        <!-- Ripple Effect -->
        <filter id="ripple" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Group containing shapes and text with the VHS effect applied -->
    <g filter="url(#vhsEffect)">
        <!-- Inner Glow Circle -->
        <circle cx="130.5" cy="50" r="25" fill="url(#innerGlow)"/>

        <!-- Animated Ripple Circle -->
        <circle cx="130.5" cy="50" r="25" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.7" filter="url(#ripple)">
            <animate attributeName="r" values="25;50;25" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite"/>
        </circle>

        <!-- Darker Pulsating Circle -->
        <circle cx="130.5" cy="50" r="25" fill="none" stroke="url(#blueGradient)" stroke-width="5" filter="url(#glow)">
            <animate attributeName="r" values="25;35;25" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="stroke" values="#8a1e1e;#2A4DA8;#8a1e1e" dur="4s" repeatCount="indefinite"/>
        </circle>

        <!-- Text 'Cintax' -->
        <text x="50%" y="35%" text-anchor="middle" dominant-baseline="middle"
              font-family="Roboto, Arial, sans-serif" font-size="36"
              fill="#292929" letter-spacing="2" filter="url(#glow) url(#shadow)">
            Cintax
        </text>

        <!-- Text 'Drop' -->
        <text x="50%" y="75%" text-anchor="middle" dominant-baseline="middle"
              font-family="Roboto, Arial, sans-serif" font-size="36"
              fill="#292929" letter-spacing="2" filter="url(#glow) url(#shadow)">
            Drop
        </text>
    </g>
</svg>
